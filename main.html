<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>
	<form action="#" method="post">
      
	 <h1>Feedback Form</h1>
		
	 <!-- Name -->	
     <label for="name">Name</label><br>
	 <input 
		 type="text" 
		 id="name" 
		 name="Name" 
		 minlength="3" 
		 maxlength="50" 
		 required>
		<br><br>
		
	 <!-- Portfolio -->
	 <label for="portfolio">Portfolio</label><br>
	 <input 
		 type="url" 
		 required>
		<br><br>
		
     <!-- Favorite Color -->
     <label for="favcolor">Favorite Color</label><br>
	 <input 
		 type="color">
		<br><br>
		
     <!-- Likeness -->
	 <label for="likeness">Likeness</label><br>
	 <input 
		 type="range" 
		 min="1" 
		 max="100">

	<br><br>

	<!-- Submit Button -->
    <input type="submit" value="Submit">

	
	

		
	</form>

</body>

</html>
